name: Capture workspace test output

on:
  push:
    branches:
      - main-validation-20260707
    paths:
      - .github/workflows/capture-workspace-test-output.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main-validation-20260707
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Capture tests
        working-directory: frontend
        run: npm test -- --run src/components/OperationalWorkflowWorkspace.current.test.js > workspace-test-output.txt 2>&1 || true
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: chore: capture workspace test output
          branch: main-validation-20260707
          file_pattern: frontend/workspace-test-output.txt
