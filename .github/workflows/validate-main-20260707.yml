name: Validate current main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Run focused component tests
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm test -- --run src/components/OperationalWorkflowWorkspace.test.js 2>&1 | tee focused-test-output.txt
      - name: Build frontend
        if: always()
        working-directory: frontend
        run: npm run build
      - name: Upload focused test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-main-focused-test-output
          path: frontend/focused-test-output.txt
