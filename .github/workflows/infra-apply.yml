name: Apply Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production-infra
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-east-2
      TF_DIR: infra/terraform/aws

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform plan
        env:
          TF_VAR_api_token_secret_arn: ${{ secrets.TF_VAR_API_TOKEN_SECRET_ARN }}
          TF_VAR_hosted_zone_id: ${{ secrets.TF_VAR_HOSTED_ZONE_ID }}
          TF_VAR_api_domain_name: ${{ secrets.TF_VAR_API_DOMAIN_NAME }}
          TF_VAR_certificate_arn: ${{ secrets.TF_VAR_CERTIFICATE_ARN }}
        run: terraform -chdir=${{ env.TF_DIR }} plan -out=tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve tfplan
