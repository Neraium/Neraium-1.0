name: Validate operational workflow

on:
  push:
    branches:
      - validate-operational-workflow
    paths:
      - .github/workflows/validate-operational-workflow.yml
      - frontend/**

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run src/components/OperationalWorkflowWorkspace.test.js
      - run: npm run build
