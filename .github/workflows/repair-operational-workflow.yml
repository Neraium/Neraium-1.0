name: Repair operational workflow constants

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-empty-tab-metric
      - name: Restore constants
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/src/components/OperationalWorkflowWorkspace.jsx')
          s = p.read_text()
          marker = 'const RESULT_TAB_IDS = new Set(["systems", "insights", "signals", "advanced"]);\n'
          restored = marker + 'const EMPTY_TAB_METRIC = "—";\nconst UNASSIGNED_SYSTEM_NAME = "Unassigned System";\n'
          if 'const EMPTY_TAB_METRIC = "—";' not in s or 'const UNASSIGNED_SYSTEM_NAME = "Unassigned System";' not in s:
              s = s.replace(marker, restored, 1)
          p.write_text(s)
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: fix: restore operational workflow constants
          branch: fix-empty-tab-metric
          file_pattern: frontend/src/components/OperationalWorkflowWorkspace.jsx
