name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
      - "scripts/bootstrap-production-aws.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: neraium-prod-api
  ECS_CLUSTER: neraium-prod-cluster
  ECS_API_SERVICE: neraium-prod-api-service
  ECS_WORKER_SERVICE: neraium-prod-worker-service
  API_TASK_FAMILY: neraium-prod-api
  WORKER_TASK_FAMILY: neraium-prod-worker
  API_LOG_GROUP: /ecs/neraium-prod-api
  WORKER_LOG_GROUP: /ecs/neraium-prod-worker
  UPLOAD_STATE_BUCKET: ${{ secrets.NERAIUM_UPLOAD_STATE_BUCKET }}
  NERAIUM_RUNTIME_DIR: /mnt/neraium-runtime
  CORS_ORIGINS: https://app.neraium.com
  NERAIUM_MAX_UPLOAD_SIZE_BYTES: "262144000"
  NERAIUM_MAX_PENDING_UPLOAD_JOBS: "50"
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  APP_TASK_ROLE_NAME: neraium-prod-task-app-role
  API_TOKEN_SECRET_ARN: ${{ vars.NERAIUM_API_TOKEN_SECRET_ARN }}
  AUTH_DATABASE_URL_SECRET_ARN: ${{ vars.NERAIUM_AUTH_DATABASE_URL_SECRET_ARN }}
  TASK_EXECUTION_ROLE_NAME: neraium-prod-ecs-task-execution-role

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve production AWS settings
        run: |
          set -euo pipefail
          test -n "$UPLOAD_STATE_BUCKET"
          test -n "$APP_TASK_ROLE_NAME"
          test -n "$TASK_EXECUTION_ROLE_NAME"
          test -n "$API_TOKEN_SECRET_ARN"
          test -n "$AUTH_DATABASE_URL_SECRET_ARN"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "API_TOKEN_SECRET_ARN=$API_TOKEN_SECRET_ARN" >> "$GITHUB_ENV"
          echo "AUTH_DATABASE_URL_SECRET_ARN=$AUTH_DATABASE_URL_SECRET_ARN" >> "$GITHUB_ENV"
          echo "APP_TASK_ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${APP_TASK_ROLE_NAME}" >> "$GITHUB_ENV"
          echo "TASK_EXECUTION_ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${TASK_EXECUTION_ROLE_NAME}" >> "$GITHUB_ENV"

      - name: Bootstrap shared AWS deployment resources
        run: |
          set -euo pipefail
          ./scripts/bootstrap-production-aws.sh

      - name: Validate ECS deployment baseline
        run: |
          set -euo pipefail

          aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --region "$AWS_REGION" \
            --query 'clusters[0].status' \
            --output text | tee ecs-cluster-status.txt

          test "$(cat ecs-cluster-status.txt)" = "ACTIVE"

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text | tee api-container-name.txt

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text | tee worker-container-name.txt

          test -n "$(cat api-container-name.txt)"
          test -n "$(cat worker-container-name.txt)"
          test "$(cat api-container-name.txt)" != "None"
          test "$(cat worker-container-name.txt)" != "None"

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION" > current-services.json

          jq -e '.failures | length == 0' current-services.json >/dev/null || {
            echo "Missing ECS services detected in $ECS_CLUSTER:" >&2
            jq -r '.failures[] | "  - \(.arn): \(.reason)"' current-services.json >&2
            exit 1
          }

          jq -e --arg api "$ECS_API_SERVICE" '
            [ .services[] | select(.status == "ACTIVE") | .serviceName ]
            | index($api)
            | . != null
          ' current-services.json >/dev/null || {
            echo "API service $ECS_API_SERVICE is not ACTIVE in cluster $ECS_CLUSTER" >&2
            exit 1
          }

          jq -e --arg worker "$ECS_WORKER_SERVICE" '
            [ .services[] | select(.status == "ACTIVE") | .serviceName ]
            | index($worker)
            | . != null
          ' current-services.json >/dev/null || {
            echo "Worker service $ECS_WORKER_SERVICE is not ACTIVE in cluster $ECS_CLUSTER" >&2
            exit 1
          }

          echo "Validated cluster, services, and task families:"
          jq -r '.services[] | "  - \(.serviceName): \(.status) taskDef=\(.taskDefinition)"' current-services.json

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"

      - name: Register API task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-api-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-api-task-definition.json)
          echo "Updating API container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" --arg AWS_REGION "$AWS_REGION" --arg API_LOG_GROUP "$API_LOG_GROUP" --arg APP_TASK_ROLE_ARN "$APP_TASK_ROLE_ARN" --arg TASK_EXECUTION_ROLE_ARN "$TASK_EXECUTION_ROLE_ARN" --arg UPLOAD_STATE_BUCKET "$UPLOAD_STATE_BUCKET" --arg NERAIUM_RUNTIME_DIR "$NERAIUM_RUNTIME_DIR" --arg API_TOKEN_SECRET_ARN "$API_TOKEN_SECRET_ARN" --arg AUTH_DATABASE_URL_SECRET_ARN "$AUTH_DATABASE_URL_SECRET_ARN" --arg CORS_ORIGINS "$CORS_ORIGINS" --arg MAX_UPLOAD_SIZE "$NERAIUM_MAX_UPLOAD_SIZE_BYTES" --arg MAX_PENDING_JOBS "$NERAIUM_MAX_PENDING_UPLOAD_JOBS" --arg LOG_LEVEL "$LOG_LEVEL" --arg LOG_FORMAT "$LOG_FORMAT" --arg BUILD_SHA "$GITHUB_SHA" '
            .taskRoleArn = $APP_TASK_ROLE_ARN
            | .executionRoleArn = $TASK_EXECUTION_ROLE_ARN
            | .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then
                .image = $IMAGE_URI
                | .command = ["python", "-m", "app.entrypoint"]
                | .environment = ((.environment // [])
                    | map(select(.name != "NERAIUM_PROCESS_ROLE" and .name != "APP_ENV" and .name != "NERAIUM_UPLOAD_STATE_BUCKET" and .name != "NERAIUM_RUNTIME_DIR" and .name != "CORS_ORIGINS" and .name != "NERAIUM_MAX_UPLOAD_SIZE_BYTES" and .name != "NERAIUM_MAX_PENDING_UPLOAD_JOBS" and .name != "LOG_LEVEL" and .name != "LOG_FORMAT" and .name != "NERAIUM_BUILD_SHA"))
                    + [
                      {"name": "NERAIUM_PROCESS_ROLE", "value": "api"},
                      {"name": "APP_ENV", "value": "prod"},
                      {"name": "NERAIUM_UPLOAD_STATE_BUCKET", "value": $UPLOAD_STATE_BUCKET},
                      {"name": "NERAIUM_RUNTIME_DIR", "value": $NERAIUM_RUNTIME_DIR},
                      {"name": "CORS_ORIGINS", "value": $CORS_ORIGINS},
                      {"name": "NERAIUM_MAX_UPLOAD_SIZE_BYTES", "value": $MAX_UPLOAD_SIZE},
                      {"name": "NERAIUM_MAX_PENDING_UPLOAD_JOBS", "value": $MAX_PENDING_JOBS},
                      {"name": "LOG_LEVEL", "value": $LOG_LEVEL},
                      {"name": "LOG_FORMAT", "value": $LOG_FORMAT},
                      {"name": "NERAIUM_BUILD_SHA", "value": $BUILD_SHA}
                    ])
                | .secrets = ((.secrets // [])
                    | map(select(.name != "NERAIUM_API_TOKEN" and .name != "NERAIUM_AUTH_DATABASE_URL"))
                    + [
                      {"name": "NERAIUM_API_TOKEN", "valueFrom": $API_TOKEN_SECRET_ARN},
                      {"name": "NERAIUM_AUTH_DATABASE_URL", "valueFrom": $AUTH_DATABASE_URL_SECRET_ARN}
                    ])
                | .logConfiguration = {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": $API_LOG_GROUP,
                      "awslogs-region": $AWS_REGION,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
              else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-api-task-definition.json > next-api-task-definition.json

          API_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-api-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "API_TASK_DEF=$API_TASK_DEF" >> "$GITHUB_ENV"

      - name: Register worker task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-worker-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-worker-task-definition.json)
          echo "Updating worker container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" --arg AWS_REGION "$AWS_REGION" --arg WORKER_LOG_GROUP "$WORKER_LOG_GROUP" --arg APP_TASK_ROLE_ARN "$APP_TASK_ROLE_ARN" --arg TASK_EXECUTION_ROLE_ARN "$TASK_EXECUTION_ROLE_ARN" --arg UPLOAD_STATE_BUCKET "$UPLOAD_STATE_BUCKET" --arg NERAIUM_RUNTIME_DIR "$NERAIUM_RUNTIME_DIR" --arg CORS_ORIGINS "$CORS_ORIGINS" --arg MAX_UPLOAD_SIZE "$NERAIUM_MAX_UPLOAD_SIZE_BYTES" --arg MAX_PENDING_JOBS "$NERAIUM_MAX_PENDING_UPLOAD_JOBS" --arg LOG_LEVEL "$LOG_LEVEL" --arg LOG_FORMAT "$LOG_FORMAT" --arg BUILD_SHA "$GITHUB_SHA" '
            .taskRoleArn = $APP_TASK_ROLE_ARN
            | .executionRoleArn = $TASK_EXECUTION_ROLE_ARN
            | .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then
                .image = $IMAGE_URI
                | .command = ["python", "-m", "app.entrypoint"]
                | .environment = ((.environment // [])
                    | map(select(.name != "NERAIUM_PROCESS_ROLE" and .name != "APP_ENV" and .name != "NERAIUM_UPLOAD_STATE_BUCKET" and .name != "NERAIUM_RUNTIME_DIR" and .name != "CORS_ORIGINS" and .name != "NERAIUM_MAX_UPLOAD_SIZE_BYTES" and .name != "NERAIUM_MAX_PENDING_UPLOAD_JOBS" and .name != "LOG_LEVEL" and .name != "LOG_FORMAT" and .name != "NERAIUM_BUILD_SHA"))
                    + [
                      {"name": "NERAIUM_PROCESS_ROLE", "value": "worker"},
                      {"name": "APP_ENV", "value": "prod"},
                      {"name": "NERAIUM_UPLOAD_STATE_BUCKET", "value": $UPLOAD_STATE_BUCKET},
                      {"name": "NERAIUM_RUNTIME_DIR", "value": $NERAIUM_RUNTIME_DIR},
                      {"name": "CORS_ORIGINS", "value": $CORS_ORIGINS},
                      {"name": "NERAIUM_MAX_UPLOAD_SIZE_BYTES", "value": $MAX_UPLOAD_SIZE},
                      {"name": "NERAIUM_MAX_PENDING_UPLOAD_JOBS", "value": $MAX_PENDING_JOBS},
                      {"name": "LOG_LEVEL", "value": $LOG_LEVEL},
                      {"name": "LOG_FORMAT", "value": $LOG_FORMAT},
                      {"name": "NERAIUM_BUILD_SHA", "value": $BUILD_SHA}
                    ])
                | .secrets = ((.secrets // [])
                    | map(select(.name != "NERAIUM_API_TOKEN" and .name != "NERAIUM_AUTH_DATABASE_URL")))
                | .logConfiguration = {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": $WORKER_LOG_GROUP,
                      "awslogs-region": $AWS_REGION,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
              else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-worker-task-definition.json > next-worker-task-definition.json

          WORKER_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-worker-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "WORKER_TASK_DEF=$WORKER_TASK_DEF" >> "$GITHUB_ENV"

      - name: Update ECS services to new task definitions
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_API_SERVICE" \
            --task-definition "$API_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_WORKER_SERVICE" \
            --task-definition "$WORKER_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS services to stabilize
        run: |
          set -euo pipefail

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION"

      - name: Show ECS service rollout status
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[*].{name:serviceName,status:status,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition}'

      - name: Verify worker task startup logging
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_WORKER_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          test -n "$TASK_ARN"
          test "$TASK_ARN" != "None"

          aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[*].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason,logStream:logStreamName,image:image}' \
            --output table

          WORKER_STATUS=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].lastStatus' \
            --output text)

          test "$WORKER_STATUS" = "RUNNING"

      - name: Verify ECS task env includes shared upload bucket
        run: |
          set -euo pipefail

          API_TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_API_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          WORKER_TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_WORKER_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          test -n "$API_TASK_ARN"
          test -n "$WORKER_TASK_ARN"
          test "$API_TASK_ARN" != "None"
          test "$WORKER_TASK_ARN" != "None"

          API_TASK_DEF_ARN=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$API_TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskDefinitionArn' \
            --output text)

          WORKER_TASK_DEF_ARN=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$WORKER_TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_UPLOAD_STATE_BUCKET`].value | [0]' \
            --output text | tee api-upload-bucket.txt

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_UPLOAD_STATE_BUCKET`].value | [0]' \
            --output text | tee worker-upload-bucket.txt

          test "$(cat api-upload-bucket.txt)" = "$UPLOAD_STATE_BUCKET"
          test "$(cat worker-upload-bucket.txt)" = "$UPLOAD_STATE_BUCKET"

          API_TOKEN_VALUE_FROM=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_API_TOKEN`].valueFrom | [0]' \
            --output text)

          AUTH_DATABASE_VALUE_FROM=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_AUTH_DATABASE_URL`].valueFrom | [0]' \
            --output text)

          test "$API_TOKEN_VALUE_FROM" = "$API_TOKEN_SECRET_ARN"
          test "$AUTH_DATABASE_VALUE_FROM" = "$AUTH_DATABASE_URL_SECRET_ARN"
