name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: neraium-prod-api
  ECS_CLUSTER: neraium-prod-cluster
  ECS_API_SERVICE: neraium-prod-api-service
  ECS_WORKER_SERVICE: neraium-prod-worker-service
  API_TASK_FAMILY: neraium-prod-api
  WORKER_TASK_FAMILY: neraium-prod-worker
  WORKER_LOG_GROUP: /ecs/neraium-prod-worker

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"

      - name: Register API task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-api-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-api-task-definition.json)
          echo "Updating API container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" '
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then .image = $IMAGE_URI else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-api-task-definition.json > next-api-task-definition.json

          API_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-api-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "API_TASK_DEF=$API_TASK_DEF" >> "$GITHUB_ENV"

      - name: Register worker task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-worker-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-worker-task-definition.json)
          echo "Updating worker container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" --arg AWS_REGION "$AWS_REGION" --arg WORKER_LOG_GROUP "$WORKER_LOG_GROUP" '
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then
                .image = $IMAGE_URI
                | .command = ["python", "-m", "app.entrypoint"]
                | .environment = ((.environment // [])
                    | map(select(.name != "NERAIUM_PROCESS_ROLE" and .name != "APP_ENV"))
                    + [
                      {"name": "NERAIUM_PROCESS_ROLE", "value": "worker"},
                      {"name": "APP_ENV", "value": "prod"}
                    ])
                | .logConfiguration = {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": $WORKER_LOG_GROUP,
                      "awslogs-region": $AWS_REGION,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
              else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-worker-task-definition.json > next-worker-task-definition.json

          WORKER_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-worker-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "WORKER_TASK_DEF=$WORKER_TASK_DEF" >> "$GITHUB_ENV"

      - name: Update ECS services to new task definitions
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_API_SERVICE" \
            --task-definition "$API_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_WORKER_SERVICE" \
            --task-definition "$WORKER_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS services to stabilize
        run: |
          set -euo pipefail

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION"

      - name: Show ECS service rollout status
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[*].{name:serviceName,status:status,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition}'

      - name: Verify worker task startup logging
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_WORKER_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          test -n "$TASK_ARN"
          test "$TASK_ARN" != "None"

          aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[*].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason,logStream:logStreamName,image:image}' \
            --output table

          LOG_STREAM=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[?name==`worker`].logStreamName | [0]' \
            --output text)

          test -n "$LOG_STREAM"
          test "$LOG_STREAM" != "None"

          aws logs tail "$WORKER_LOG_GROUP" \
            --region "$AWS_REGION" \
            --since 10m

          aws logs tail "$WORKER_LOG_GROUP" \
            --region "$AWS_REGION" \
            --since 10m | tee worker-startup.log

          grep -q 'neraium_startup_role=worker' worker-startup.log
          grep -q 'worker_loop_started' worker-startup.log
          grep -q 'worker_polling_queue' worker-startup.log
