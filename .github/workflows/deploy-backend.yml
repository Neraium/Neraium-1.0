name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
      - "scripts/bootstrap-production-aws.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: neraium-prod-api
  ECS_CLUSTER: neraium-prod-cluster
  ECS_API_SERVICE: neraium-prod-api-service
  ECS_WORKER_SERVICE: neraium-prod-worker-service
  API_TASK_FAMILY: neraium-prod-api
  WORKER_TASK_FAMILY: neraium-prod-worker
  API_LOG_GROUP: /ecs/neraium-prod-api
  WORKER_LOG_GROUP: /ecs/neraium-prod-worker
  UPLOAD_STATE_BUCKET: ${{ secrets.NERAIUM_UPLOAD_STATE_BUCKET }}
  NERAIUM_RUNTIME_DIR: /mnt/neraium-runtime
  CORS_ORIGINS: https://app.neraium.com
  API_CONTAINER_PORT: "8080"
  NERAIUM_MAX_UPLOAD_SIZE_BYTES: "262144000"
  NERAIUM_MAX_PENDING_UPLOAD_JOBS: "50"
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  APP_TASK_ROLE_NAME: neraium-prod-task-app-role
  API_TOKEN_SECRET_ARN: ${{ vars.NERAIUM_API_TOKEN_SECRET_ARN }}
  AUTH_DATABASE_URL_SECRET_ARN: ${{ vars.NERAIUM_AUTH_DATABASE_URL_SECRET_ARN }}
  NERAIUM_BOOTSTRAP_ADMIN_EMAIL: ${{ vars.NERAIUM_BOOTSTRAP_ADMIN_EMAIL }}
  NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN: ${{ vars.NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN }}
  NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD: ${{ vars.NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD || 'false' }}
  TASK_EXECUTION_ROLE_NAME: neraium-prod-ecs-task-execution-role

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@b040164c4934333d597f3f9c67502ff28f814e9c # v2.1.6

      - name: Resolve production AWS settings
        run: |
          set -euo pipefail
          test -n "$UPLOAD_STATE_BUCKET"
          test -n "$APP_TASK_ROLE_NAME"
          test -n "$TASK_EXECUTION_ROLE_NAME"
          test -n "$API_TOKEN_SECRET_ARN"
          test -n "$AUTH_DATABASE_URL_SECRET_ARN"
          test -n "$NERAIUM_BOOTSTRAP_ADMIN_EMAIL"
          test -n "$NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN"
          case "${NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD,,}" in
            true|false) ;;
            *) echo "NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD must be true or false" >&2; exit 1 ;;
          esac
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "API_TOKEN_SECRET_ARN=$API_TOKEN_SECRET_ARN" >> "$GITHUB_ENV"
          echo "AUTH_DATABASE_URL_SECRET_ARN=$AUTH_DATABASE_URL_SECRET_ARN" >> "$GITHUB_ENV"
          echo "APP_TASK_ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${APP_TASK_ROLE_NAME}" >> "$GITHUB_ENV"
          echo "TASK_EXECUTION_ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${TASK_EXECUTION_ROLE_NAME}" >> "$GITHUB_ENV"

      - name: Bootstrap shared AWS deployment resources
        run: |
          set -euo pipefail
          ./scripts/bootstrap-production-aws.sh

      - name: Validate ECS deployment baseline
        run: |
          set -euo pipefail

          aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --region "$AWS_REGION" \
            --query 'clusters[0].status' \
            --output text | tee ecs-cluster-status.txt

          test "$(cat ecs-cluster-status.txt)" = "ACTIVE"

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text | tee api-container-name.txt

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text | tee worker-container-name.txt

          test -n "$(cat api-container-name.txt)"
          test -n "$(cat worker-container-name.txt)"
          test "$(cat api-container-name.txt)" != "None"
          test "$(cat worker-container-name.txt)" != "None"

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION" > current-services.json

          jq -e '.failures | length == 0' current-services.json >/dev/null || {
            echo "Missing ECS services detected in $ECS_CLUSTER:" >&2
            jq -r '.failures[] | "  - \(.arn): \(.reason)"' current-services.json >&2
            exit 1
          }

          jq -e --arg api "$ECS_API_SERVICE" '
            [ .services[] | select(.status == "ACTIVE") | .serviceName ]
            | index($api)
            | . != null
          ' current-services.json >/dev/null || {
            echo "API service $ECS_API_SERVICE is not ACTIVE in cluster $ECS_CLUSTER" >&2
            exit 1
          }

          jq -e --arg worker "$ECS_WORKER_SERVICE" '
            [ .services[] | select(.status == "ACTIVE") | .serviceName ]
            | index($worker)
            | . != null
          ' current-services.json >/dev/null || {
            echo "Worker service $ECS_WORKER_SERVICE is not ACTIVE in cluster $ECS_CLUSTER" >&2
            exit 1
          }

          API_SERVICE_LOAD_BALANCER_COUNT=$(jq --arg api "$ECS_API_SERVICE" '[.services[] | select(.serviceName == $api) | .loadBalancers[]?] | length' current-services.json)
          test "$API_SERVICE_LOAD_BALANCER_COUNT" = "1"

          API_TARGET_GROUP_ARN=$(jq -r --arg api "$ECS_API_SERVICE" '.services[] | select(.serviceName == $api) | .loadBalancers[0].targetGroupArn' current-services.json)
          test -n "$API_TARGET_GROUP_ARN"
          test "$API_TARGET_GROUP_ARN" != "null"

          CURRENT_API_CONTAINER_NAME=$(jq -r --arg api "$ECS_API_SERVICE" '.services[] | select(.serviceName == $api) | .loadBalancers[0].containerName' current-services.json)
          test -n "$CURRENT_API_CONTAINER_NAME"
          test "$CURRENT_API_CONTAINER_NAME" != "null"
          echo "API_TARGET_GROUP_ARN=$API_TARGET_GROUP_ARN" >> "$GITHUB_ENV"
          echo "API_LOAD_BALANCER_CONTAINER_NAME=$CURRENT_API_CONTAINER_NAME" >> "$GITHUB_ENV"

          aws elbv2 describe-target-groups \
            --target-group-arns "$API_TARGET_GROUP_ARN" \
            --region "$AWS_REGION" > api-target-group.json

          jq -e '.TargetGroups[0].HealthCheckPath == "/api/health"' api-target-group.json >/dev/null
          jq -e --arg port "$API_CONTAINER_PORT" '.TargetGroups[0].HealthCheckPort == "traffic-port" or .TargetGroups[0].HealthCheckPort == $port' api-target-group.json >/dev/null

          LOAD_BALANCER_ARN=$(jq -r '.TargetGroups[0].LoadBalancerArns[0]' api-target-group.json)
          test -n "$LOAD_BALANCER_ARN"
          test "$LOAD_BALANCER_ARN" != "null"

          API_TASK_SECURITY_GROUP_ID=$(jq -r --arg api "$ECS_API_SERVICE" '.services[] | select(.serviceName == $api) | .networkConfiguration.awsvpcConfiguration.securityGroups[0]' current-services.json)
          LOAD_BALANCER_SECURITY_GROUP_ID=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns "$LOAD_BALANCER_ARN" \
            --region "$AWS_REGION" \
            --query 'LoadBalancers[0].SecurityGroups[0]' \
            --output text)
          test -n "$API_TASK_SECURITY_GROUP_ID"
          test "$API_TASK_SECURITY_GROUP_ID" != "null"
          test -n "$LOAD_BALANCER_SECURITY_GROUP_ID"
          test "$LOAD_BALANCER_SECURITY_GROUP_ID" != "None"

          aws ec2 describe-security-groups \
            --group-ids "$API_TASK_SECURITY_GROUP_ID" \
            --region "$AWS_REGION" > api-task-security-group.json
          if ! jq -e --argjson port "$API_CONTAINER_PORT" --arg source "$LOAD_BALANCER_SECURITY_GROUP_ID" '
            [
              .SecurityGroups[0].IpPermissions[]?
              | select(.IpProtocol == "tcp" and .FromPort <= $port and .ToPort >= $port)
              | .UserIdGroupPairs[]?
              | select(.GroupId == $source)
            ] | length > 0
          ' api-task-security-group.json >/dev/null; then
            aws ec2 authorize-security-group-ingress \
              --group-id "$API_TASK_SECURITY_GROUP_ID" \
              --protocol tcp \
              --port "$API_CONTAINER_PORT" \
              --source-group "$LOAD_BALANCER_SECURITY_GROUP_ID" \
              --region "$AWS_REGION"
          fi

          aws elbv2 describe-listeners \
            --load-balancer-arn "$LOAD_BALANCER_ARN" \
            --region "$AWS_REGION" > api-load-balancer-listeners.json

          jq -e '[.Listeners[].Port] | index(80) != null and index(443) != null' api-load-balancer-listeners.json >/dev/null

          echo "Validated cluster, services, task families, and API load balancer assumptions:"
          jq -r '.services[] | "  - \(.serviceName): \(.status) taskDef=\(.taskDefinition)"' current-services.json
          jq -r '.TargetGroups[0] | "  - targetGroup=\(.TargetGroupArn) healthPath=\(.HealthCheckPath) healthPort=\(.HealthCheckPort)"' api-target-group.json

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"

      - name: Register API task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-api-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-api-task-definition.json)
          echo "Updating API container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" --arg AWS_REGION "$AWS_REGION" --arg API_LOG_GROUP "$API_LOG_GROUP" --arg APP_TASK_ROLE_ARN "$APP_TASK_ROLE_ARN" --arg TASK_EXECUTION_ROLE_ARN "$TASK_EXECUTION_ROLE_ARN" --arg UPLOAD_STATE_BUCKET "$UPLOAD_STATE_BUCKET" --arg NERAIUM_RUNTIME_DIR "$NERAIUM_RUNTIME_DIR" --arg API_TOKEN_SECRET_ARN "$API_TOKEN_SECRET_ARN" --arg AUTH_DATABASE_URL_SECRET_ARN "$AUTH_DATABASE_URL_SECRET_ARN" --arg BOOTSTRAP_ADMIN_EMAIL "$NERAIUM_BOOTSTRAP_ADMIN_EMAIL" --arg BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN "$NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN" --arg BOOTSTRAP_ADMIN_RESET_PASSWORD "$NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD" --arg CORS_ORIGINS "$CORS_ORIGINS" --arg BACKEND_PORT "$API_CONTAINER_PORT" --argjson CONTAINER_PORT "$API_CONTAINER_PORT" --arg HEALTHCHECK_COMMAND "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_CONTAINER_PORT}/api/health', timeout=5).read()\" || exit 1" --arg MAX_UPLOAD_SIZE "$NERAIUM_MAX_UPLOAD_SIZE_BYTES" --arg MAX_PENDING_JOBS "$NERAIUM_MAX_PENDING_UPLOAD_JOBS" --arg LOG_LEVEL "$LOG_LEVEL" --arg LOG_FORMAT "$LOG_FORMAT" --arg BUILD_SHA "$GITHUB_SHA" '
            .taskRoleArn = $APP_TASK_ROLE_ARN
            | .executionRoleArn = $TASK_EXECUTION_ROLE_ARN
            | .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then
                .image = $IMAGE_URI
                | .command = ["python", "-m", "app.entrypoint"]
                | .environment = ((.environment // [])
                    | map(select(.name != "NERAIUM_PROCESS_ROLE" and .name != "APP_ENV" and .name != "BACKEND_HOST" and .name != "BACKEND_PORT" and .name != "NERAIUM_UPLOAD_STATE_BUCKET" and .name != "NERAIUM_RUNTIME_DIR" and .name != "CORS_ORIGINS" and .name != "NERAIUM_MAX_UPLOAD_SIZE_BYTES" and .name != "NERAIUM_MAX_PENDING_UPLOAD_JOBS" and .name != "LOG_LEVEL" and .name != "LOG_FORMAT" and .name != "NERAIUM_BUILD_SHA" and .name != "NERAIUM_BOOTSTRAP_ADMIN_EMAIL" and .name != "NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD"))
                    + [
                      {"name": "NERAIUM_PROCESS_ROLE", "value": "api"},
                      {"name": "APP_ENV", "value": "prod"},
                      {"name": "BACKEND_HOST", "value": "0.0.0.0"},
                      {"name": "BACKEND_PORT", "value": $BACKEND_PORT},
                      {"name": "NERAIUM_UPLOAD_STATE_BUCKET", "value": $UPLOAD_STATE_BUCKET},
                      {"name": "NERAIUM_RUNTIME_DIR", "value": $NERAIUM_RUNTIME_DIR},
                      {"name": "CORS_ORIGINS", "value": $CORS_ORIGINS},
                      {"name": "NERAIUM_MAX_UPLOAD_SIZE_BYTES", "value": $MAX_UPLOAD_SIZE},
                      {"name": "NERAIUM_MAX_PENDING_UPLOAD_JOBS", "value": $MAX_PENDING_JOBS},
                      {"name": "LOG_LEVEL", "value": $LOG_LEVEL},
                      {"name": "LOG_FORMAT", "value": $LOG_FORMAT},
                      {"name": "NERAIUM_BUILD_SHA", "value": $BUILD_SHA},
                      {"name": "NERAIUM_BOOTSTRAP_ADMIN_EMAIL", "value": $BOOTSTRAP_ADMIN_EMAIL},
                      {"name": "NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD", "value": $BOOTSTRAP_ADMIN_RESET_PASSWORD}
                    ])
                | .portMappings = [{"containerPort": $CONTAINER_PORT, "hostPort": $CONTAINER_PORT, "protocol": "tcp"}]
                | .healthCheck = {
                    "command": ["CMD-SHELL", $HEALTHCHECK_COMMAND],
                    "interval": 30,
                    "timeout": 10,
                    "retries": 3,
                    "startPeriod": 10
                  }
                | .secrets = ((.secrets // [])
                    | map(select(.name != "NERAIUM_API_TOKEN" and .name != "NERAIUM_AUTH_DATABASE_URL" and .name != "NERAIUM_BOOTSTRAP_ADMIN_PASSWORD"))
                    + [
                      {"name": "NERAIUM_API_TOKEN", "valueFrom": $API_TOKEN_SECRET_ARN},
                      {"name": "NERAIUM_AUTH_DATABASE_URL", "valueFrom": $AUTH_DATABASE_URL_SECRET_ARN},
                      {"name": "NERAIUM_BOOTSTRAP_ADMIN_PASSWORD", "valueFrom": $BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN}
                    ])
                | .logConfiguration = {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": $API_LOG_GROUP,
                      "awslogs-region": $AWS_REGION,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
              else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-api-task-definition.json > next-api-task-definition.json

          API_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-api-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "API_TASK_DEF=$API_TASK_DEF" >> "$GITHUB_ENV"
          echo "API_CONTAINER_NAME=$CONTAINER_NAME" >> "$GITHUB_ENV"

      - name: Register worker task definition with new backend image
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition > current-worker-task-definition.json

          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current-worker-task-definition.json)
          echo "Updating worker container $CONTAINER_NAME to image $IMAGE_URI"

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" --arg AWS_REGION "$AWS_REGION" --arg WORKER_LOG_GROUP "$WORKER_LOG_GROUP" --arg APP_TASK_ROLE_ARN "$APP_TASK_ROLE_ARN" --arg TASK_EXECUTION_ROLE_ARN "$TASK_EXECUTION_ROLE_ARN" --arg UPLOAD_STATE_BUCKET "$UPLOAD_STATE_BUCKET" --arg NERAIUM_RUNTIME_DIR "$NERAIUM_RUNTIME_DIR" --arg CORS_ORIGINS "$CORS_ORIGINS" --arg MAX_UPLOAD_SIZE "$NERAIUM_MAX_UPLOAD_SIZE_BYTES" --arg MAX_PENDING_JOBS "$NERAIUM_MAX_PENDING_UPLOAD_JOBS" --arg LOG_LEVEL "$LOG_LEVEL" --arg LOG_FORMAT "$LOG_FORMAT" --arg BUILD_SHA "$GITHUB_SHA" '
            .taskRoleArn = $APP_TASK_ROLE_ARN
            | .executionRoleArn = $TASK_EXECUTION_ROLE_ARN
            | .containerDefinitions = (.containerDefinitions | map(
              if .name == $CONTAINER_NAME then
                .image = $IMAGE_URI
                | .command = ["python", "-m", "app.entrypoint"]
                | .environment = ((.environment // [])
                    | map(select(.name != "NERAIUM_PROCESS_ROLE" and .name != "APP_ENV" and .name != "NERAIUM_UPLOAD_STATE_BUCKET" and .name != "NERAIUM_RUNTIME_DIR" and .name != "CORS_ORIGINS" and .name != "NERAIUM_MAX_UPLOAD_SIZE_BYTES" and .name != "NERAIUM_MAX_PENDING_UPLOAD_JOBS" and .name != "LOG_LEVEL" and .name != "LOG_FORMAT" and .name != "NERAIUM_BUILD_SHA" and .name != "NERAIUM_BOOTSTRAP_ADMIN_EMAIL" and .name != "NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD"))
                    + [
                      {"name": "NERAIUM_PROCESS_ROLE", "value": "worker"},
                      {"name": "APP_ENV", "value": "prod"},
                      {"name": "NERAIUM_UPLOAD_STATE_BUCKET", "value": $UPLOAD_STATE_BUCKET},
                      {"name": "NERAIUM_RUNTIME_DIR", "value": $NERAIUM_RUNTIME_DIR},
                      {"name": "CORS_ORIGINS", "value": $CORS_ORIGINS},
                      {"name": "NERAIUM_MAX_UPLOAD_SIZE_BYTES", "value": $MAX_UPLOAD_SIZE},
                      {"name": "NERAIUM_MAX_PENDING_UPLOAD_JOBS", "value": $MAX_PENDING_JOBS},
                      {"name": "LOG_LEVEL", "value": $LOG_LEVEL},
                      {"name": "LOG_FORMAT", "value": $LOG_FORMAT},
                      {"name": "NERAIUM_BUILD_SHA", "value": $BUILD_SHA}
                    ])
                | .secrets = ((.secrets // [])
                    | map(select(.name != "NERAIUM_API_TOKEN" and .name != "NERAIUM_AUTH_DATABASE_URL" and .name != "NERAIUM_BOOTSTRAP_ADMIN_PASSWORD")))
                | .logConfiguration = {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": $WORKER_LOG_GROUP,
                      "awslogs-region": $AWS_REGION,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
              else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-worker-task-definition.json > next-worker-task-definition.json

          WORKER_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://next-worker-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "WORKER_TASK_DEF=$WORKER_TASK_DEF" >> "$GITHUB_ENV"

      - name: Update ECS services to new task definitions
        run: |
          set -euo pipefail

          jq -n --arg targetGroupArn "$API_TARGET_GROUP_ARN" --arg containerName "$API_CONTAINER_NAME" --argjson containerPort "$API_CONTAINER_PORT" '[{
            targetGroupArn: $targetGroupArn,
            containerName: $containerName,
            containerPort: $containerPort
          }]' > api-load-balancers.json

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_API_SERVICE" \
            --task-definition "$API_TASK_DEF" \
            --load-balancers file://api-load-balancers.json \
            --force-new-deployment \
            --region "$AWS_REGION"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_WORKER_SERVICE" \
            --task-definition "$WORKER_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS services to stabilize
        run: |
          set -euo pipefail

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION"

      - name: Show ECS service rollout status
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[*].{name:serviceName,status:status,desired:desiredCount,running:runningCount,pending:pendingCount,taskDefinition:taskDefinition}'

      - name: Verify worker task startup logging
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_WORKER_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          test -n "$TASK_ARN"
          test "$TASK_ARN" != "None"

          aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[*].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason,logStream:logStreamName,image:image}' \
            --output table

          WORKER_STATUS=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].lastStatus' \
            --output text)

          test "$WORKER_STATUS" = "RUNNING"

      - name: Verify ECS task env includes shared upload bucket
        run: |
          set -euo pipefail

          API_TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_API_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          WORKER_TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_WORKER_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' \
            --output text)

          test -n "$API_TASK_ARN"
          test -n "$WORKER_TASK_ARN"
          test "$API_TASK_ARN" != "None"
          test "$WORKER_TASK_ARN" != "None"

          API_TASK_DEF_ARN=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$API_TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskDefinitionArn' \
            --output text)

          WORKER_TASK_DEF_ARN=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$WORKER_TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_UPLOAD_STATE_BUCKET`].value | [0]' \
            --output text | tee api-upload-bucket.txt

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_UPLOAD_STATE_BUCKET`].value | [0]' \
            --output text | tee worker-upload-bucket.txt

          test "$(cat api-upload-bucket.txt)" = "$UPLOAD_STATE_BUCKET"
          test "$(cat worker-upload-bucket.txt)" = "$UPLOAD_STATE_BUCKET"

          API_TOKEN_VALUE_FROM=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_API_TOKEN`].valueFrom | [0]' \
            --output text)

          AUTH_DATABASE_VALUE_FROM=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_AUTH_DATABASE_URL`].valueFrom | [0]' \
            --output text)

          test "$API_TOKEN_VALUE_FROM" = "$API_TOKEN_SECRET_ARN"
          test "$AUTH_DATABASE_VALUE_FROM" = "$AUTH_DATABASE_URL_SECRET_ARN"

          API_BOOTSTRAP_ADMIN_EMAIL_VALUE=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_BOOTSTRAP_ADMIN_EMAIL`].value | [0]' \
            --output text)

          API_BOOTSTRAP_ADMIN_PASSWORD_VALUE_FROM=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_BOOTSTRAP_ADMIN_PASSWORD`].valueFrom | [0]' \
            --output text)

          WORKER_BOOTSTRAP_ADMIN_EMAIL_COUNT=$(aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'length(taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_BOOTSTRAP_ADMIN_EMAIL`])' \
            --output text)

          WORKER_BOOTSTRAP_ADMIN_PASSWORD_COUNT=$(aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'length(taskDefinition.containerDefinitions[0].secrets[?name==`NERAIUM_BOOTSTRAP_ADMIN_PASSWORD`])' \
            --output text)

          API_BOOTSTRAP_ADMIN_RESET_PASSWORD_VALUE=$(aws ecs describe-task-definition \
            --task-definition "$API_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD`].value | [0]' \
            --output text)

          WORKER_BOOTSTRAP_ADMIN_RESET_PASSWORD_COUNT=$(aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'length(taskDefinition.containerDefinitions[0].environment[?name==`NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD`])' \
            --output text)

          test "$API_BOOTSTRAP_ADMIN_EMAIL_VALUE" = "$NERAIUM_BOOTSTRAP_ADMIN_EMAIL"
          test "$API_BOOTSTRAP_ADMIN_PASSWORD_VALUE_FROM" = "$NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN"
          test "$API_BOOTSTRAP_ADMIN_RESET_PASSWORD_VALUE" = "$NERAIUM_BOOTSTRAP_ADMIN_RESET_PASSWORD"
          test "$WORKER_BOOTSTRAP_ADMIN_EMAIL_COUNT" = "0"
          test "$WORKER_BOOTSTRAP_ADMIN_PASSWORD_COUNT" = "0"
          test "$WORKER_BOOTSTRAP_ADMIN_RESET_PASSWORD_COUNT" = "0"

      - name: Verify API bootstrap admin startup event
        run: |
          set -euo pipefail
          START_TIME=$(( $(date +%s) - 900 ))000
          EVENTS=""
          for attempt in 1 2 3 4 5 6; do
            EVENTS=$(aws logs filter-log-events \
              --log-group-name "$API_LOG_GROUP" \
              --start-time "$START_TIME" \
              --filter-pattern 'bootstrap_admin_' \
              --region "$AWS_REGION" \
              --query 'events[].message' \
              --output text 2>/dev/null || true)
            if [[ -n "$EVENTS" && "$EVENTS" != "None" ]]; then
              printf '%s\n' "$EVENTS"
              break
            fi
            sleep 10
          done
          if [[ -z "$EVENTS" || "$EVENTS" == "None" ]]; then
            echo "bootstrap_admin_event_not_observed"
          fi
