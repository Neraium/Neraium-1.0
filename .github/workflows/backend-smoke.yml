name: Backend Route Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run backend smoke tests
        env:
          PYTHONPATH: backend
        run: python -m pytest -q tests/test_backend_route_smoke.py
