name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
          APP_ENV: test
          NERAIUM_RUNTIME_DIR: backend/app/runtime-test
        run: python -m pytest tests

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run TLS PostgreSQL integration tests
        run: bash scripts/run-postgres-integration.sh --no-header

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint:ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test -- --run

  docker-production:
    name: Docker production validation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neraium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neraium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IMAGE_NAME: neraium-backend:ci
      CONTAINER_NAME: neraium-backend-ci
      HOST_PORT: "18080"
      CONTAINER_PORT: "8080"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build production Docker image
        run: docker build -f backend/Dockerfile -t "$IMAGE_NAME" backend

      - name: Validate image runtime defaults
        run: |
          set -euo pipefail
          test "$(docker image inspect "$IMAGE_NAME" --format '{{.Config.User}}')" = "neraium"
          docker image inspect "$IMAGE_NAME" --format '{{json .Config.ExposedPorts}}' | grep '8080/tcp'

      - name: Start production container
        run: |
          set -euo pipefail
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --add-host=host.docker.internal:host-gateway \
            -p "127.0.0.1:${HOST_PORT}:${CONTAINER_PORT}" \
            -e APP_ENV=production \
            -e NERAIUM_PROCESS_ROLE=all \
            -e BACKEND_HOST=0.0.0.0 \
            -e BACKEND_PORT="$CONTAINER_PORT" \
            -e CORS_ORIGINS=https://app.neraium.com \
            -e CORS_ORIGIN_REGEX='^https://([a-z0-9-]+\.)?neraium\.com$' \
            -e NERAIUM_RUNTIME_DIR=/mnt/neraium-runtime \
            -e NERAIUM_AUTH_DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/neraium \
            -e NERAIUM_API_TOKEN=docker-validation-token \
            -e NERAIUM_BOOTSTRAP_ADMIN_EMAIL=docker-validation-admin@example.com \
            -e NERAIUM_BOOTSTRAP_ADMIN_PASSWORD=docker-validation-password \
            -e NERAIUM_MAX_UPLOAD_SIZE_BYTES=262144000 \
            -e NERAIUM_MAX_PENDING_UPLOAD_JOBS=50 \
            -e LOG_LEVEL=INFO \
            -e LOG_FORMAT=json \
            -e AWS_EC2_METADATA_DISABLED=true \
            -e AWS_ACCESS_KEY_ID=dummy \
            -e AWS_SECRET_ACCESS_KEY=dummy \
            -e AWS_DEFAULT_REGION=us-east-2 \
            "$IMAGE_NAME"

      - name: Wait for health endpoint
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS "http://127.0.0.1:${HOST_PORT}/api/health" >/tmp/neraium-health.json; then
              cat /tmp/neraium-health.json
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null | grep -qx true; then
              docker logs "$CONTAINER_NAME" >&2 || true
              exit 1
            fi
            sleep 2
          done
          docker logs "$CONTAINER_NAME" >&2 || true
          exit 1

      - name: Confirm health and readiness
        run: |
          set -euo pipefail
          curl -fsS "http://127.0.0.1:${HOST_PORT}/api/health"
          curl -fsS "http://127.0.0.1:${HOST_PORT}/api/ready"

      - name: Verify non-root process and runtime files
        run: |
          set -euo pipefail
          docker exec "$CONTAINER_NAME" sh -c 'pid1_uid="$(awk "/^Uid:/{print \$2}" /proc/1/status)"; echo "pid1_uid=${pid1_uid}"; test "$pid1_uid" != "0"; test "$(id -u)" != "0"'
          docker exec "$CONTAINER_NAME" sh -c 'test -w /app/app/runtime && test -w /mnt/neraium-runtime && test -w /var/log/neraium'
          docker exec "$CONTAINER_NAME" sh -c 'test -f /mnt/neraium-runtime/runtime.db'
          docker exec "$CONTAINER_NAME" python -c 'import os, psycopg; conn = psycopg.connect(os.environ["NERAIUM_AUTH_DATABASE_URL"]); row = conn.execute("SELECT to_regclass('"'"'public.auth_users'"'"')").fetchone(); conn.close(); assert row and row[0] == "auth_users"'
          docker exec "$CONTAINER_NAME" python -c "import app.main, api.cognition_contracts, runtime.runtime_contracts, db.migrations.create_normalization_tables, cognition.structural_stability_index, evidence.evidence_lineage_engine, integrations.scada_adapter"

      - name: Stop production container
        if: always()
        run: |
          docker logs "$CONTAINER_NAME" || true
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

  security:
    name: Dependency security
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --progress-spinner off

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=critical
