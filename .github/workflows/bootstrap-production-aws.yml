name: Bootstrap Production AWS

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  UPLOAD_STATE_BUCKET: ${{ vars.NERAIUM_UPLOAD_STATE_BUCKET }}
  APP_TASK_ROLE_NAME: ${{ vars.NERAIUM_APP_TASK_ROLE_NAME }}

jobs:
  bootstrap-production-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate bootstrap inputs
        run: |
          set -euo pipefail
          test -n "$UPLOAD_STATE_BUCKET"
          test -n "$APP_TASK_ROLE_NAME"

      - name: Ensure production bucket and task role
        run: |
          set -euo pipefail
          ./scripts/bootstrap-production-aws.sh
