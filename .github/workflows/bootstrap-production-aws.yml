name: Bootstrap Production AWS

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  API_LOG_GROUP: /ecs/neraium-prod-api
  WORKER_LOG_GROUP: /ecs/neraium-prod-worker
  UPLOAD_STATE_BUCKET: ${{ secrets.NERAIUM_UPLOAD_STATE_BUCKET }}
  APP_TASK_ROLE_NAME: ${{ vars.NERAIUM_APP_TASK_ROLE_NAME }}
  API_TOKEN_SECRET_ARN: ${{ vars.NERAIUM_API_TOKEN_SECRET_ARN }}
  AUTH_DATABASE_URL_SECRET_ARN: ${{ vars.NERAIUM_AUTH_DATABASE_URL_SECRET_ARN }}
  NERAIUM_BOOTSTRAP_ADMIN_EMAIL: ${{ vars.NERAIUM_BOOTSTRAP_ADMIN_EMAIL }}
  NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN: ${{ vars.NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN }}
  TASK_EXECUTION_ROLE_NAME: neraium-prod-ecs-task-execution-role

jobs:
  bootstrap-production-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate bootstrap inputs
        run: |
          set -euo pipefail
          test -n "$UPLOAD_STATE_BUCKET"
          test -n "$APP_TASK_ROLE_NAME"
          test -n "$API_TOKEN_SECRET_ARN"
          test -n "$AUTH_DATABASE_URL_SECRET_ARN"
          test -n "$NERAIUM_BOOTSTRAP_ADMIN_EMAIL"
          test -n "$NERAIUM_BOOTSTRAP_ADMIN_PASSWORD_SECRET_ARN"
          test -n "$TASK_EXECUTION_ROLE_NAME"

      - name: Ensure production bucket, roles, and log groups
        run: |
          set -euo pipefail
          ./scripts/bootstrap-production-aws.sh
