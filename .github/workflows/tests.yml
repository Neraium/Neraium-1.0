name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          PYTHONPATH=./backend pytest tests/ -v --tb=short
      - name: Run linters
        run: |
          pip install pylint flake8
          pylint backend/app --exit-zero || true
          flake8 backend/app --max-line-length=120 || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend && npm ci
      - name: Build frontend
        run: |
          cd frontend && npm run build
      - name: Lint frontend
        run: |
          cd frontend && npm run lint:ci

  frontend-functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci
      - name: Install Playwright browser
        run: |
          cd frontend && npx playwright install --with-deps chromium
      - name: Start backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8010 --app-dir backend > backend.log 2>&1 &
      - name: Wait for backend health
        run: |
          python - <<'PY'
          import time
          import urllib.request

          deadline = time.time() + 90
          while time.time() < deadline:
            try:
              with urllib.request.urlopen("http://127.0.0.1:8010/health", timeout=3) as resp:
                if resp.status == 200:
                  raise SystemExit(0)
            except Exception:
              time.sleep(1)
          raise SystemExit("Backend health check timed out")
          PY
      - name: Run frontend functional e2e
        run: |
          cd frontend && npm run test:e2e -- tests/e2e/functional-verification.spec.js
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
      - name: Backend log on failure
        if: failure()
        run: cat backend.log

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile -t neraium-backend:test backend
          docker run --rm neraium-backend:test python -c "from app.main import app; print('✓ App imports successfully')"

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

  report:
    runs-on: ubuntu-latest
    needs: [backend, frontend, frontend-functional, docker, security]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🧪 Pilot Readiness Check"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Backend | ${{ needs.backend.result }} |"
          echo "| Frontend | ${{ needs.frontend.result }} |"
          echo "| Frontend Functional | ${{ needs.frontend-functional.result }} |"
          echo "| Docker | ${{ needs.docker.result }} |"
          echo "| Security | ${{ needs.security.result }} |"
