name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          PYTHONPATH=./backend pytest tests/ -v --tb=short
        continue-on-error: true
      - name: Run linters
        run: |
          pip install pylint flake8
          pylint backend/app --exit-zero || true
          flake8 backend/app --max-line-length=120 || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend && npm ci
      - name: Build frontend
        run: |
          cd frontend && npm run build
      - name: Lint frontend
        run: |
          cd frontend && npm run lint || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile -t neraium-backend:test .
          docker run --rm neraium-backend:test python -c "from app.main import app; print('✓ App imports successfully')"

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

  report:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, security]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🧪 Pilot Readiness Check"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Backend | ${{ needs.backend.result }} |"
          echo "| Frontend | ${{ needs.frontend.result }} |"
          echo "| Docker | ${{ needs.docker.result }} |"
          echo "| Security | ${{ needs.security.result }} |"
